name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gwpm_test
          POSTGRES_USER: gwpm
          POSTGRES_PASSWORD: gwpm_test
        ports:
          - '5433:5432'
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - '6380:6379'
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://gwpm:gwpm_test@localhost:5433/gwpm_test
      REDIS_URL: redis://localhost:6380
      NODE_ENV: test
      ANTHROPIC_API_KEY: test-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run check:structure
      - run: npm run db:migrate
      - run: npm run test:coverage
      - name: Check coverage thresholds
        run: echo "Coverage thresholds enforced by vitest config"

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t gw-pm:$GITHUB_SHA .
